<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biodata Pribadi | Sky Theme</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome untuk ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Latar Belakang Langit & Awan -->
    <div class="sky-background">
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div>
        <div class="cloud cloud-4"></div>
    </div>

    <div class="container">
        <!-- Card Biodata Utama -->
        <main class="biodata-card glass fade-in">
            <div class="profile-header">
                <div class="profile-img-wrapper">
                    <img src="https://via.placeholder.com/150" alt="Foto Profil" class="profile-img">
                </div>
                <h1>Dika Wigunatama</h1>
                <p class="tagline">Pelajar </p>
            </div>

            <div class="content-section">
                <div class="info-grid">
                    <div class="info-item">
                        <i class="fas fa-user"></i>
                        <div class="info-text">
                            <span>Nama Panggilan</span>
                            <p>Dika</p>
                        </div>
                    </div>
                    <div class="info-item">
                        <i class="fas fa-calendar-alt"></i>
                        <div class="info-text">
                            <span>Tempat, Tanggal Lahir</span>
                            <p>Purwakarta, 07 Desember 2013</p>
                        </div>
                    </div>
                    <div class="info-item">
                        <i class="fas fa-map-marker-alt"></i>
                        <div class="info-text">
                            <span>Alamat</span>
                            <p>Jl. Griya Abdi Negara No. 067</p>
                        </div>
                    </div>
                    <div class="info-item">
                        <i class="fas fa-graduation-cap"></i>
                        <div class="info-text">
                            <span>Pendidikan</span>
                            <p>Sdn 2 Sukatani</p>
                        </div>
                    </div>
                </div>

                <div class="hobbies-section">
                    <h3>Hobi & Minat</h3>
                    <div class="hobbies-tags">
                        <span class="tag">Membaca</span>
                        <span class="tag">Coding</span>
                        <span class="tag">Main Hame</span>
                        <span class="tag">Main Sepeda</span>
                    </div>
                </div>

                <div class="social-links">
                    <a href="#" class="social-icon" title="Instagram"><i class="fab fa-instagram"></i></a
                    
                    <a href="#" class="social-icon" title="GitHub"><i class="fab fa-github"></i></a>
                    
                </div>
            </div>
            
            <footer class="card-footer">
                <p>&copy; 2026 Dika Wigunatama</p>
     </footer>
    </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
